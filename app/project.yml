name: smoovscope
options:
  bundleIdPrefix: pw.dbu
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  smoovscope:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: smoovscope
    resources:
      - path: Resources/otlp-receiver
        buildPhase: resources
    info:
      path: smoovscope/Info.plist
      properties:
        CFBundleName: smoovscope
        CFBundleDisplayName: smoovscope
        CFBundleIdentifier: pw.dbu.smoovscope
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: ""
        LSUIElement: false
    entitlements:
      path: smoovscope/smoovscope.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pw.dbu.smoovscope
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Build Go sidecar (universal binary)
        script: |
          set -e
          cd "$SRCROOT/.."
          ./scripts/build-sidecar.sh
        inputFiles:
          - $(SRCROOT)/../sidecar/main.go
          - $(SRCROOT)/../sidecar/store.go
          - $(SRCROOT)/../sidecar/go.mod
        outputFiles:
          - $(SRCROOT)/Resources/otlp-receiver
